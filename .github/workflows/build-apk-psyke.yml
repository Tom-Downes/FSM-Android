name: Build APK (Psyke)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Resolve project dir
        shell: bash
        run: |
          set -euo pipefail
          SPEC_PATH="$(find . -maxdepth 4 -type f -name buildozer.spec | head -n 1 || true)"
          if [ -z "$SPEC_PATH" ]; then
            echo "No buildozer.spec found in repository"
            exit 1
          fi
          PROJECT_DIR="$(dirname "$SPEC_PATH")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using PROJECT_DIR=$PROJECT_DIR"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # python-for-android/Gradle builds require Java 17+ (AGP requirement).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Build debug APK (capture log)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.PROJECT_DIR }}/buildozer.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.PROJECT_DIR }}/bin/*.apk
